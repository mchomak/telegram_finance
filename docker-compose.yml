services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - whisper_cache:/home/botuser/.cache/whisper
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-expensebot}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  pgdata:
  whisper_cache:
